{% extends 'admin/base.html' %}
{% block title %}{{ 'Edit' if slider else 'Add' }} Slider{% endblock %}
{% block page_title %}{{ 'Edit' if slider else 'Add' }} Slider{% endblock %}

{% block content %}
<div class="bg-white rounded-3 border p-4" style="max-width:540px">
  <form method="POST" enctype="multipart/form-data">
    <div class="mb-3">
      <label class="form-label fw-500">Slider Image</label>
      <input type="file" class="form-control" name="image" accept="image/*" {% if not slider %}required{% endif %}>
      {% if slider and slider.image %}
      <div class="mt-2">
        <img src="{{ url_for('static', filename=slider.image) }}" style="height:80px;border-radius:6px" alt="">
        <small class="text-muted ms-2">Current image</small>
      </div>
      {% endif %}
    </div>
    <div class="mb-3">
      <label class="form-label fw-500">Caption</label>
      <input type="text" class="form-control" name="caption" value="{{ slider.caption if slider else '' }}" placeholder="e.g. Festival Collection 2024">
    </div>
    <div class="mb-4">
      <label class="form-label fw-500">Display Order</label>
      <input type="number" class="form-control" name="order_num" value="{{ slider.order_num if slider else 0 }}" min="0">
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-saffron px-4">Save Slider</button>
      <a href="{{ url_for('admin_sliders') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
