<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product – EthniCraft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<div class="navbar">
  <a href="index.html"><i class="fa fa-fw fa-home"></i> Home</a>
  <a href="#"><i class="fa fa-fw fa-search"></i> Search</a>
  <a href="#"><i class="fa fa-fw fa-envelope"></i> Contact</a>
  <a href="#"><i class="fa fa-fw fa-user"></i> Login</a>
</div>
<STYLE>
.navbar {
  width: 100%;
  background-color: #555;
  overflow: auto;
}
.navbar a {
  float: left;
  text-align: center;
  padding: 12px;
  color: white;
  text-decoration: none;
  font-size: 17px;
}
.navbar a:hover {
  background-color: #000;
}
@media screen and (max-width: 500px) {
  .navbar a {
    float: none;
    display: block;
  }
}
</STYLE>

<style>
.product-detail {
  display: flex;
  flex-wrap: wrap;
  gap: 50px;
  max-width: 1100px;
  margin: 50px auto;
  padding: 0 20px;
}
.product-detail .image-col {
  flex: 1 1 400px;
}
.product-detail .image-col img {
  width: 100%;
  border-radius: 10px;
  object-fit: cover;
  max-height: 550px;
}
.product-detail .info-col {
  flex: 1 1 350px;
}
.product-detail .info-col h1 {
  font-size: 32px;
  margin-bottom: 10px;
}
.product-detail .price {
  color: grey;
  font-size: 26px;
  margin-bottom: 20px;
}
.product-detail .description {
  font-size: 16px;
  line-height: 1.6;
  margin-bottom: 30px;
  color: #333;
}
.product-detail button {
  border: none;
  outline: 0;
  padding: 14px 30px;
  color: white;
  background-color: #000;
  text-align: center;
  cursor: pointer;
  font-size: 18px;
}
.product-detail button:hover {
  opacity: 0.7;
}
.back-link {
  display: inline-block;
  margin: 30px 20px 0;
  color: #555;
  text-decoration: none;
  font-size: 15px;
}
.back-link:hover {
  text-decoration: underline;
}
</style>
</head>
<body>

<a href="index.html" class="back-link">&laquo; Back to all products</a>

<div class="product-detail">
  <div class="image-col">
    <img src="https://images.pexels.com/photos/52518/jeans-pants-blue-shop-52518.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="Product image">
  </div>
  <div class="info-col">
    <h1>Product Name</h1>
    <p class="price">₹1599.00</p>
    <p class="description">
      This is a placeholder description for the product. Add details here about
      the fabric, fit, craftsmanship, and styling notes once you decide what
      should appear on this page for every item.
    </p>
    <button>Add to Cart</button>
  </div>
</div>

</body>
</html>
