<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login – EthniCraft</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1A0A00 0%, #3D1A00 100%); min-height: 100vh; display: flex; align-items: center; font-family: 'Inter', sans-serif; }
    .login-card { background: #fff; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 24px 60px rgba(0,0,0,.4); }
    .login-logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #D4601A; text-align: center; margin-bottom: .3rem; }
    .login-sub { text-align: center; color: #7A6652; font-size: .85rem; margin-bottom: 2rem; }
    .form-control:focus { border-color: #D4601A; box-shadow: 0 0 0 .2rem rgba(212,96,26,.2); }
    .btn-login { background: #D4601A; border: none; width: 100%; padding: .75rem; border-radius: 8px; font-weight: 500; letter-spacing: .5px; }
    .btn-login:hover { background: #b84e12; }
    label { font-size: .88rem; font-weight: 500; color: #3a2a1a; }
  </style>
</head>
<body>
  <div class="container d-flex justify-content-center">
    <div class="login-card">
      <div class="login-logo">✦ EthniCraft</div>
      <div class="login-sub">Admin Panel</div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} py-2 mb-3" style="font-size:.88rem">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="mb-3">
          <label for="email">Email</label>
          <input type="email" class="form-control mt-1" id="email" name="email" placeholder="admin@ethnicwear.com" required>
        </div>
        <div class="mb-4">
          <label for="password">Password</label>
          <input type="password" class="form-control mt-1" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-login text-white">Sign In</button>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
