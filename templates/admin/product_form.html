{% extends 'admin/base.html' %}
{% block title %}{{ 'Edit' if product else 'Add' }} Product{% endblock %}
{% block page_title %}{{ 'Edit' if product else 'Add' }} Product{% endblock %}

{% block content %}
<div class="bg-white rounded-3 border p-4" style="max-width:560px">
  <form method="POST" enctype="multipart/form-data">
    <div class="mb-3">
      <label class="form-label fw-500">Product Name</label>
      <input type="text" class="form-control" name="name" value="{{ product.name if product else '' }}" placeholder="e.g. Silk Kurta Set" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-500">Product Image</label>
      <input type="file" class="form-control" name="image" accept="image/*" {% if not product %}required{% endif %}>
      {% if product and product.image %}
      <div class="mt-2">
        <img src="{{ url_for('static', filename=product.image) }}" style="height:80px;border-radius:6px" alt="">
        <small class="text-muted ms-2">Current image</small>
      </div>
      {% endif %}
    </div>
    <div class="mb-3">
      <label class="form-label fw-500">Price (₹)</label>
      <input type="number" class="form-control" name="price" value="{{ product.price if product else '' }}" placeholder="999" step="0.01" min="0" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-500">Category</label>
      <select class="form-select" name="category_id">
        <option value="">— No Category —</option>
        {% for cat in categories %}
        <option value="{{ cat.id }}" {% if product and product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-4">
      <label class="form-label fw-500">Description</label>
      <textarea class="form-control" name="description" rows="3" placeholder="Brief product description...">{{ product.description if product else '' }}</textarea>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-saffron px-4">Save Product</button>
      <a href="{{ url_for('admin_products') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
